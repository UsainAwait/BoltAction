name: Rnnr
run-name: Rnnrs for pipeline ${{ github.event.client_payload.pipeline_id }}

on:
  repository_dispatch:
    types: [run]

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      macos_matrix:  ${{ steps.gen.outputs.macos_matrix }}
      macos_n:       ${{ steps.gen.outputs.macos_n }}
      docker_matrix: ${{ steps.gen.outputs.docker_matrix }}
      docker_n:      ${{ steps.gen.outputs.docker_n }}
    steps:
      - name: Decide what the pipeline needs
        id: gen
        env:
          # client_payload is untrusted + unmasked.
          STATUS:      ${{ github.event.client_payload.status }}
          PROJECT_ID:  ${{ github.event.client_payload.project_id }}
          PIPELINE_ID: ${{ github.event.client_payload.pipeline_id }}
          GITLAB_API_URL:   ${{ vars.GITLAB_API_URL || 'https://gitlab.com/api/v4' }}
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN }}
        run: |
          set -euo pipefail
 
          empty() {
            { echo "macos_n=0"; echo "docker_n=0"
              echo 'macos_matrix={"i":[]}'; echo 'docker_matrix={"i":[]}'; } >> "$GITHUB_OUTPUT"
          }
 
          # Pipeline events fire on every status transition. Act once, at start.
          if [[ "${STATUS}" != "pending" && "${STATUS}" != "running" ]]; then
            echo "Status '${STATUS}' is not 'pending' nor 'running' — nothing to provision."
            empty; exit 0
          fi
 
          # Untrusted values land in an API URL: require integers.
          [[ "${PROJECT_ID}"  =~ ^[0-9]+$ ]] || { echo "::error::bad project_id";  exit 1; }
          [[ "${PIPELINE_ID}" =~ ^[0-9]+$ ]] || { echo "::error::bad pipeline_id"; exit 1; }
 
          # Ask GitLab what this pipeline contains (jobs not yet started).
          # NOTE: counts up to 100 jobs; add pagination if a pipeline exceeds that.
          jobs="$(curl -sf \
            --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
            "${GITLAB_API_URL}/projects/${PROJECT_ID}/pipelines/${PIPELINE_ID}/jobs?per_page=100&scope[]=created&scope[]=pending")"

          count_tag() { jq --arg t "$1" '[.[] | select(.tag_list | index($t))] | length' <<<"$jobs"; }
          m="$(count_tag macos)";  (( m > 20 )) && m=20
          d="$(count_tag docker)"; (( d > 20 )) && d=20
 
          mk() { jq -nc --argjson n "$1" '{i: [range(1; $n + 1)]}'; }
          {
            echo "macos_n=${m}";  echo "docker_n=${d}"
            echo "macos_matrix=$(mk "$m")"; echo "docker_matrix=$(mk "$d")"
          } >> "$GITHUB_OUTPUT"
          echo "Pipeline ${PIPELINE_ID} needs ${m} macOS + ${d} docker runner(s)."


  runner-macos:
    needs: setup
    if: ${{ needs.setup.outputs.macos_n != '0' }}   # gate avoids empty-matrix error
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.macos_matrix) }}
    name: macos-${{ matrix.i }}
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: nixbuild/nix-quick-install-action@889f3180bb5f064ee9e3201428d04ae9e41d54ad #v31
      - name: Ephemeral GitLab Runner (shell)
        uses: ./.github/actions/rnnr
        with:
          runner-token: ${{ secrets.GITLAB_RUNNER_TOKEN_MACOS }}
          description: gh-${{ github.run_id }}-macos-${{ matrix.i }}
          # executor auto-resolves to shell on macOS
          wait-timeout: '900'
          max-builds: '1'

  runner-docker:
    needs: setup
    if: ${{ needs.setup.outputs.docker_n != '0' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.docker_matrix) }}
    name: docker-${{ matrix.i }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Ephemeral GitLab Runner (docker)
        uses: ./.github/actions/rnnr
        with:
          runner-token: ${{ secrets.GITLAB_RUNNER_TOKEN_DOCKER }}
          executor: docker
          docker-image: docker:27
          docker-privileged: 'true'
          feature-flags: |
            FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR=true
          description: gh-${{ github.run_id }}-docker-${{ matrix.i }}
          wait-timeout: '600'
          max-builds: '1'
