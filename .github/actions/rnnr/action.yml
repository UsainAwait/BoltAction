name: GitLab Runner (ephemeral)
description: >-
  Run an ephemeral GitLab Runner inside a GitHub-hosted runner to execute GitLab
  CI job(s), then exit. Composite action — no Node runtime, no build step.
  Supports the docker executor (Linux runners) and shell executor (macOS/Linux).
author: your-handle
branding:
  icon: server
  color: purple

inputs:
  runner-token:
    description: >-
      GitLab runner authentication token (starts with "glrt-", recommended) or a
      legacy registration token. Create the runner in GitLab
      (Settings > CI/CD > Runners > New runner), set its tags / untagged / access
      level there, and store the glrt- token as a GitHub Actions secret.
    required: true
  executor:
    description: >-
      GitLab executor to use, matching GitLab's own names:
        - "docker": run each job in a container (Linux runners only; GitHub-hosted
          macOS runners have no Docker).
        - "shell": run jobs directly on the host. Required for macOS/Xcode builds;
          also usable on Linux to skip containerization.
      Leave empty to auto-select: docker on Linux, shell on macOS.
    required: false
    default: ''
  gitlab-url:
    description: Base URL of the GitLab instance.
    required: false
    default: https://gitlab.com/
  description:
    description: Runner description shown in GitLab. Defaults to "github-<run_id>".
    required: false
    default: ''
  docker-image:
    description: '[docker executor] Fallback image when a job omits `image:`.'
    required: false
    default: alpine:latest
  docker-privileged:
    description: '[docker executor] Run job containers in privileged mode (Docker-in-Docker).'
    required: false
    default: 'true'
  max-builds:
    description: Number of jobs to run before the runner exits.
    required: false
    default: '1'
  wait-timeout:
    description: >-
      Seconds to wait for a job before exiting, so the GitHub job never hangs
      forever. 0 = wait indefinitely.
    required: false
    default: '600'
  log-level:
    description: panic, fatal, error, warning (default), info, debug.
    required: false
    default: warning
  feature-flags:
    description: >-
      Optional runner feature flags, one KEY=value per line (values are TOML
      booleans, e.g. FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR=true).
    required: false
    default: ''
  runner-version:
    description: '[Linux] GitLab Runner version to download, e.g. "v17.10.1", or "latest". macOS installs via Homebrew.'
    required: false
    default: latest
  runner-arch:
    description: '[Linux] Override the downloaded binary arch (e.g. linux-amd64, linux-arm64). Empty = auto-detect from RUNNER_ARCH.'
    required: false
    default: ''

  # --- legacy registration-token only (ignored for glrt- tokens) ---
  tag-list:
    description: '[legacy only] Comma-separated runner tags. With glrt- tokens, set tags in the GitLab UI.'
    required: false
    default: ''
  run-untagged:
    description: '[legacy only] Whether the runner picks up untagged jobs.'
    required: false
    default: 'true'
  access-level:
    description: '[legacy only] not_protected or ref_protected.'
    required: false
    default: not_protected

runs:
  using: composite
  steps:
    - name: Install GitLab Runner
      shell: bash
      env:
        # NOTE: do NOT name these RUNNER_* — RUNNER_ARCH/RUNNER_OS/etc. are
        # reserved GitHub defaults and a step env: cannot override them, so the
        # value silently becomes the built-in (e.g. RUNNER_ARCH=X64).
        GLR_VERSION: ${{ inputs.runner-version }}
        GLR_ARCH: ${{ inputs.runner-arch }}
      run: |
        set -euo pipefail
        config="${RUNNER_TEMP}/gitlab-runner-config.toml"

        case "${RUNNER_OS}" in
          Linux)
            bin="${RUNNER_TEMP}/gitlab-runner"
            # Map the built-in RUNNER_ARCH to GitLab's binary naming unless overridden.
            arch="${GLR_ARCH}"
            if [[ -z "${arch}" ]]; then
              case "${RUNNER_ARCH}" in
                X64)   arch="linux-amd64" ;;
                ARM64) arch="linux-arm64" ;;
                *) echo "::error::Unsupported RUNNER_ARCH '${RUNNER_ARCH}'; set runner-arch explicitly."; exit 1 ;;
              esac
            fi
            url="https://gitlab-runner-downloads.s3.amazonaws.com/${GLR_VERSION}/binaries/gitlab-runner-${arch}"
            echo "Downloading ${url}"
            curl -fsSL --retry 3 -o "${bin}" "${url}"
            chmod +x "${bin}"
            ;;
          macOS)
            # Homebrew install avoids the code-signing / Gatekeeper issues that
            # bite a raw curl-downloaded binary on Apple Silicon.
            echo "Installing gitlab-runner via Homebrew"
            HOMEBREW_NO_AUTO_UPDATE=1 brew install gitlab-runner >/dev/null
            bin="$(command -v gitlab-runner)"
            ;;
          *)
            echo "::error::Unsupported runner OS: ${RUNNER_OS}. This action supports Linux and macOS."
            exit 1
            ;;
        esac

        "${bin}" --version
        {
          echo "GLR_BIN=${bin}"
          echo "GLR_CONFIG=${config}"
        } >> "$GITHUB_ENV"

    - name: Run GitLab Runner
      shell: bash
      env:
        TOKEN: ${{ inputs.runner-token }}
        EXECUTOR_INPUT: ${{ inputs.executor }}
        GITLAB_URL: ${{ inputs.gitlab-url }}
        DESCRIPTION: ${{ inputs.description }}
        DOCKER_IMAGE: ${{ inputs.docker-image }}
        DOCKER_PRIVILEGED: ${{ inputs.docker-privileged }}
        MAX_BUILDS: ${{ inputs.max-builds }}
        WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
        LOG_LEVEL: ${{ inputs.log-level }}
        FEATURE_FLAGS: ${{ inputs.feature-flags }}
        TAG_LIST: ${{ inputs.tag-list }}
        RUN_UNTAGGED: ${{ inputs.run-untagged }}
        ACCESS_LEVEL: ${{ inputs.access-level }}
      run: |
        set -euo pipefail

        # Keep the token out of every log line, no matter what the binary prints.
        echo "::add-mask::${TOKEN}"

        : "${DESCRIPTION:=github-${GITHUB_RUN_ID}}"

        # Resolve executor: explicit input wins; otherwise pick by OS.
        executor="${EXECUTOR_INPUT}"
        if [[ -z "${executor}" ]]; then
          if [[ "${RUNNER_OS}" == "macOS" ]]; then executor="shell"; else executor="docker"; fi
        fi

        # Guard the one combination that cannot work.
        if [[ "${executor}" == "docker" && "${RUNNER_OS}" == "macOS" ]]; then
          echo "::error::The docker executor is unavailable on GitHub-hosted macOS runners. Use executor: shell."
          exit 1
        fi

        # Executor flags shared by register and run-single. Always >=2 elements,
        # so expansion is safe under set -u even on macOS's bash 3.2.
        exec_args=(--executor "${executor}")
        if [[ "${executor}" == "docker" ]]; then
          exec_args+=(--docker-image "${DOCKER_IMAGE}")
          [[ "${DOCKER_PRIVILEGED}" == "true" ]] && exec_args+=(--docker-privileged)
        fi

        # Optional feature-flags template. When present we MUST run via a config
        # file, because run-single --token ignores config (and thus the flags).
        template=""
        if [[ -n "${FEATURE_FLAGS//[[:space:]]/}" ]]; then
          template="${RUNNER_TEMP}/gitlab-runner-template.toml"
          {
            echo "[[runners]]"
            echo "  [runners.feature_flags]"
            while IFS= read -r ff; do
              ff="${ff//[[:space:]]/}"; [[ -z "${ff}" ]] && continue
              # Values are emitted unquoted: TOML feature_flags must be booleans.
              printf '    %s = %s\n' "${ff%%=*}" "${ff#*=}"
            done <<< "${FEATURE_FLAGS}"
          } > "${template}"
        fi

        tmpl_args=()
        [[ -n "${template}" ]] && tmpl_args+=(--template-config "${template}")

        run_via_config=false

        if [[ "${TOKEN}" == glrt-* ]]; then
          if [[ -n "${template}" ]]; then
            # Need a config file so the flags apply: register locally (no new
            # server-side runner is created for an auth token), then run via -c.
            "${GLR_BIN}" --log-level "${LOG_LEVEL}" register --non-interactive \
              --config "${GLR_CONFIG}" "${tmpl_args[@]}" \
              --url "${GITLAB_URL}" --token "${TOKEN}" --name "${DESCRIPTION}" \
              "${exec_args[@]}"
            run_via_config=true
          else
            run_token="${TOKEN}"
          fi
        else
          echo "::warning::Legacy registration token detected. These are deprecated and disabled by default for new GitLab.com namespaces. Prefer a glrt- authentication token."
          "${GLR_BIN}" --log-level "${LOG_LEVEL}" register --non-interactive \
            --config "${GLR_CONFIG}" "${tmpl_args[@]+"${tmpl_args[@]}"}" \
            --url "${GITLAB_URL}" \
            --registration-token "${TOKEN}" \
            --name "${DESCRIPTION}" \
            "${exec_args[@]}" \
            --tag-list "${TAG_LIST}" \
            --run-untagged="${RUN_UNTAGGED}" \
            --locked=false \
            --access-level="${ACCESS_LEVEL}"
          run_token="$(sed -n 's/^[[:space:]]*token[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' "${GLR_CONFIG}" | head -n1)"
          echo "::add-mask::${run_token}"
          echo "GLR_RUN_TOKEN=${run_token}" >> "$GITHUB_ENV"   # for the cleanup step
          run_via_config=true   # use the config we just wrote, so flags apply
        fi

        if [[ "${run_via_config}" == true ]]; then
          "${GLR_BIN}" --log-level "${LOG_LEVEL}" run-single \
            --config "${GLR_CONFIG}" --runner "${DESCRIPTION}" \
            --max-builds "${MAX_BUILDS}" \
            --wait-timeout "${WAIT_TIMEOUT}"
        else
          "${GLR_BIN}" --log-level "${LOG_LEVEL}" run-single \
            --url "${GITLAB_URL}" \
            --token "${run_token}" \
            "${exec_args[@]}" \
            --max-builds "${MAX_BUILDS}" \
            --wait-timeout "${WAIT_TIMEOUT}"
        fi

    - name: Unregister (legacy tokens only)
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        if [[ -n "${GLR_RUN_TOKEN:-}" ]]; then
          echo "::add-mask::${GLR_RUN_TOKEN}"
          "${GLR_BIN}" unregister --url "${GITLAB_URL:-https://gitlab.com/}" --token "${GLR_RUN_TOKEN}" || true
        fi
